<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - Vũ Trụ Truyện Trực Tuyến</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --text-color: #c5c6c7;
            --primary-color: #66fcf1;
            --secondary-color: #45f3ff;
            --blink-color: #fffb00;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #06060c, #110e26, #1b163a);
            color: var(--text-color);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Hiệu ứng bầu trời sao lấp lánh tinh tú (Blink Blink) */
        .starry-sky {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            background: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                        radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                        radial-gradient(#45f3ff, rgba(69,243,255,.1) 2px, transparent 20px);
            background-size: 550px 550px, 350px 350px, 400px 400px;
            animation: blinkBlink 6s infinite ease-in-out alternate;
            z-index: 1;
            opacity: 0.5;
        }

        @keyframes blinkBlink {
            0% { opacity: 0.3; transform: scale(0.98); }
            100% { opacity: 0.8; transform: scale(1.02); }
        }

        header {
            position: relative;
            z-index: 2;
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(102, 252, 241, 0.1);
            background: rgba(11, 12, 16, 0.7);
            backdrop-filter: blur(10px);
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            color: var(--primary-color);
            text-shadow: 0 0 15px rgba(102, 252, 241, 0.5);
            letter-spacing: 2px;
        }

        header p {
            margin: 10px 0 0 0;
            color: #888;
            font-size: 1rem;
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        footer {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 30px 20px;
            color: #666;
            font-size: 0.9rem;
            border-top: 1px solid rgba(102, 252, 241, 0.05);
            margin-top: 60px;
        }
    </style>
</head>
<body>
    <div class="starry-sky"></div>
    
    <header>
        <h1>🌌 AFTER 13 FRIDAY</h1>
        <p>Nơi những câu chuyện chạm đến tận cùng cảm xúc</p>
    </header>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <footer>
        <p>&copy; 2026 After13Friday. Bản quyền thuộc về Vũ Trụ Truyện Trực Tuyến.</p>
    </footer>
</body>
</html>
