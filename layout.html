<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - Vũ Trụ Truyện Trực Tuyến</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --text-color: #c5c6c7;
            --primary-color: #66fcf1;
            --secondary-color: #45f3ff;
        }
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #06060c, #110e26, #1b163a);
            color: var(--text-color);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        /* Hiệu ứng bầu trời sao lấp lánh tinh tú (Blink Blink) */
        .starry-sky {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            background: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                        radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                        radial-gradient(#45f3ff, rgba(69,243,255,.1) 2px, transparent 20px);
            background-size: 550px 550px, 350px 350px, 400px 400px;
            animation: blinkBlink 6s infinite ease-in-out alternate;
            z-index: 1;
            opacity: 0.6;
        }
        @keyframes blinkBlink {
            0% { opacity: 0.4; transform: scale(0.98); }
            100% { opacity: 0.9; transform: scale(1.02); }
        }
        header {
            position: relative;
            z-index: 2;
            padding: 30px 20px;
            text-align: center;
            background: rgba(11, 12, 16, 0.6);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(102, 252, 241, 0.2);
        }
        header h1 {
            margin: 0;
            font-size: 2.8rem;
            color: #fff;
            letter-spacing: 4px;
            text-shadow: 0 0 10px var(--primary-color), 0 0 20px var(--primary-color);
        }
        .main-container {
            position: relative;
            z-index: 2;
            max-width: 1100px;
            margin: 40px auto;
            padding: 25px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <div class="starry-sky"></div>
    <header>
        <h1>✨ AFTER13FRIDAY ✨</h1>
        <p>🌌 Không Gian Sáng Tác Khởi Nguyên - Vũ Trụ Truyện Lấp Lánh 🌌</p>
    </header>
    <div class="main-container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
