{% extends "layout.html" %}
{% block content %}
<h2 style="color: #fff; border-bottom: 2px solid rgba(102, 252, 241, 0.2); padding-bottom: 12px; margin-top: 0; font-weight: 500;">
    📚 Tuyển Tập Truyện Mới Cập Nhật
</h2>
<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; margin-top: 25px;">
    {% for story in stories %}
    <div style="background: rgba(11, 12, 16, 0.5); padding: 25px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.05);">
        <h3 style="margin-top: 0; color: var(--primary-color);">📖 {{ story.title }}</h3>
        <p style="font-size: 0.9rem; color: #aaa;">Cấu trúc: {{ story.chapters }} chương</p>
        <p style="font-size: 0.9rem; color: #aaa;">Tương tác: ✨ {{ story.views }} lượt xem</p>
        <a href="#" style="display: inline-block; margin-top: 15px; padding: 10px 20px; background: linear-gradient(45deg, #00f2fe, #4facfe); color: #000; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 0.85rem;">Khám Phá Ngay</a>
    </div>
    {% endfor %}
</div>
{% endblock %}
